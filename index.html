    document.body.appendChild(m);
    renderModal();
};;

// ===================== ИСТОРИЯ — все задания за день с маркировкой =====================
const openHistoryModal = () => {
    let today=getToday(), allTasks=[...baseTasks,...customTasks];

    // Собираем все даты где были активные задания
    let allDates = new Set();
    for(let task of allTasks){
        for(let d of (task.completedDates||[])) allDates.add(d);
        // Добавляем последние 14 дней для ежедневных
        if(task.repeatType==='daily'){
            for(let i=0;i<14;i++){let dt=new Date();dt.setDate(dt.getDate()-i);allDates.add(dt.toISOString().split('T')[0]);}
        }
    }
    let sortedDates=[...allDates].sort((a,b)=>b.localeCompare(a));

    // Статистика для вкладок
    let statsAll={}, statsLevel={}, statsToday={};
    for(let task of allTasks){
        for(let d of(task.completedDates||[])){
            statsAll[task.name]=(statsAll[task.name]||0)+1;
            if(d>=levelStartDate) statsLevel[task.name]=(statsLevel[task.name]||0)+1;
            if(d===today) statsToday[task.name]=(statsToday[task.name]||0)+1;
        }
    }

    let modal=document.createElement("div");
    modal.className="modal-overlay center-modal";
    modal.innerHTML=`<div class="modal" style="max-width:440px;"><h3>История</h3>
        <div class="history-tabs">
            <button class="history-tab active" data-tab="log">📅 По датам</button>
            <button class="history-tab" data-tab="today">Сегодня</button>
            <button class="history-tab" data-tab="level">Уровень</button>
            <button class="history-tab" data-tab="alltime">Всё время</button>
        </div>
        <div id="historyContent" class="history-list"></div>
        <div class="modal-buttons"><button id="closeHistory">Закрыть</button></div>
    </div>`;
    document.body.appendChild(modal);

    const renderTab = tab => {
        let content=document.getElementById("historyContent");
        if(tab==='log'){
            // Показываем все задания за каждый день с маркировкой
            // Для прошлых дней — читаем снапшот (не зависит от обновлений кода)
            let html='';
            for(let date of sortedDates.slice(0,60)){
                let isPastDate = date < today;
                let snap = isPastDate ? getSnapshot(date) : null;

                let displayTasks; // [{name, xpReward, done}]
                if(snap){
                    displayTasks = snap;
                } else {
                    let dayTasks = getAllTasksForDate(date);
                    if(!dayTasks.length) continue;
                    displayTasks = dayTasks.map(t=>({
                        name: t.name, xpReward: t.xpReward,
                        done: !!(t.completedDates && t.completedDates.includes(date))
                    }));
                }
                if(!displayTasks.length) continue;

                let label=date===today?'Сегодня':date===getPrevDay(today)?'Вчера':formatDate(date);
                let doneCount=displayTasks.filter(t=>t.done).length;
                html+=`<div class="history-section-title">${label} <span style="color:var(--ios-green);font-weight:500;">${doneCount}/${displayTasks.length}</span></div>`;
                for(let t of displayTasks){
                    html+=`<div class="history-date-entry ${t.done?'done':'missed'}">
                        <div class="history-entry-left">
                            <div class="history-status-dot ${t.done?'done':'missed'}"></div>
                            <span class="history-entry-name">${t.name}</span>
                        </div>
                        <span class="history-entry-right ${t.done?'done':'missed'}">${t.done?`+${t.xpReward} XP`:'не выполнено'}</span>
                    </div>`;
                }
            }
            content.innerHTML=html||"<div style='text-align:center;color:var(--text-muted);padding:20px;'>Нет данных</div>";
        } else {
            let stats=tab==='today'?statsToday:(tab==='level'?statsLevel:statsAll);
            let entries=Object.entries(stats).sort((a,b)=>b[1]-a[1]);
            if(!entries.length){content.innerHTML="<div style='text-align:center;color:var(--text-muted);padding:20px;'>Нет выполненных заданий</div>";return;}
            content.innerHTML=entries.map(([n,c])=>`<div class="history-stat-item"><span>${n}</span><span class="history-count">${c} раз</span></div>`).join('');
        }
    };

    renderTab('log');
    document.querySelectorAll('.history-tab').forEach(tab=>{
        tab.onclick=()=>{document.querySelectorAll('.history-tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');renderTab(tab.dataset.tab);};
    });
    document.getElementById("closeHistory").onclick=()=>modal.remove();
};

// КАЛЕНДАРЬ
let calDate=new Date();
const renderCalendar=()=>{
    let y=calDate.getFullYear(),m=calDate.getMonth();
    document.getElementById("monthYear").innerText=`${monthNames[m]} ${y}`;
    let first=new Date(y,m,1),off=first.getDay()===0?6:first.getDay()-1,days=new Date(y,m+1,0).getDate();
    let container=document.getElementById("calendarDays"); container.innerHTML="";
    for(let i=0;i<off;i++) container.appendChild(document.createElement("div"));
    for(let d=1;d<=days;d++){
        let key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        let today=getToday(), isPast=key<today;
        let snap = isPast ? getSnapshot(key) : null;

        let completedCount, totalCount, importantMissed;
        if(snap){
            completedCount = snap.filter(s=>s.done).length;
            totalCount = snap.length;
            importantMissed = false; // снапшот уже зафиксирован, штрафы учтены
        } else {
            let allDayTasks=getAllTasksForDate(key);
            completedCount=allDayTasks.filter(t=>t.completedDates?.includes(key)).length;
            totalCount=allDayTasks.length;
            importantMissed=allDayTasks.some(t=>t.isImportant&&!t.autoRollover&&!t.completedDates?.includes(key)&&key<today);
        }

        let isToday=key===today, isSelected=key===selectedCalDate;
        let day=document.createElement("div");
        day.className="calendar-day"+(totalCount>0?" has-tasks":"")+(importantMissed?" has-penalty":"")+(isToday?" today":"")+(isSelected?" selected-day":"");
        day.innerHTML=completedCount>0&&totalCount>0?`<span>${d}</span><span style="position:absolute;bottom:2px;right:3px;font-size:8px;color:var(--ios-green);opacity:0.8">${Math.round(completedCount/totalCount*100)}%</span>`:`<span>${d}</span>`;
        day.onclick=()=>{selectedCalDate=key;renderCalendar();showDayDetails(key);};
        container.appendChild(day);
    }
};

const formatDayLabel=(date)=>{
    let today=getToday(),yesterday=getPrevDay(today);
    if(date===today) return 'Сегодня';
    if(date===yesterday) return 'Вчера';
    let [y,m,d]=date.split('-');
    let months=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
    return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
};

const buildDaySummaryHTML=(dateLabel, earnedXP, doneCount, total)=>{
    let xpClass=earnedXP>0?'':'zero';
    return `<div class="day-summary">
        <div>
            <div class="day-summary-date">${dateLabel}</div>
            <div class="day-summary-stats">${doneCount} из ${total} заданий выполнено</div>
        </div>
        <div class="day-summary-xp ${xpClass}">${earnedXP>0?'+'+earnedXP+' XP':'0 XP'}</div>
    </div>`;
};

const showDayDetails=(date)=>{
    let detailsDiv=document.getElementById("dayDetails");
    let today=getToday(), isFuture=date>today, isPast=date<today;
    let dateLabel=formatDayLabel(date);

    // Для прошлых дней — читаем снапшот
    let snap = isPast ? getSnapshot(date) : null;

    if(snap){
        // Соединяем снапшот с живыми задачами — ищем задание по имени чтобы получить id
        let allTasks = [...baseTasks, ...customTasks];
        let doneItems=snap.filter(s=>s.done);
        let missedItems=snap.filter(s=>!s.done);
        let earnedXP=doneItems.reduce((sum,s)=>sum+s.xpReward,0);
        let summary=buildDaySummaryHTML(dateLabel, earnedXP, doneItems.length, snap.length);

        let doneHTML='', missedHTML='';
        if(doneItems.length){
            doneHTML=`<div class="day-section-label">✓ Выполнено</div>`
                +doneItems.map(s=>`<div class="day-detail-item done-item">
                    <span class="day-detail-name">${s.name}</span>
                    <span class="day-detail-done">+${s.xpReward} XP</span>
                </div>`).join('');
        }
        if(missedItems.length){
            missedHTML=`<div class="day-section-label">Не выполнено</div>`
                +missedItems.map(s=>{
                    // Ищем живое задание по имени чтобы получить id для отметки
                    let live = allTasks.find(t=>t.name===s.name);
                    return `<div class="day-detail-item missed-item">
                        <span class="day-detail-name">${s.name}</span>
                        ${live && !live.completedDates?.includes(date)
                            ? `<button class="complete-past-btn" data-id="${live.id}" data-xp="${s.xpReward}" data-date="${date}">+${s.xpReward} ✓</button>`
                            : `<span class="day-detail-miss">−${s.xpReward}</span>`}
                    </div>`;
                }).join('');
        }
        detailsDiv.innerHTML=summary+doneHTML+missedHTML
            +`<button class="day-add-btn" data-date="${date}" style="margin-top:10px;">+ Добавить задание</button>`;
        detailsDiv.querySelectorAll('.complete-past-btn').forEach(btn=>{
            btn.onclick=()=>{
                let ok=completeTask(btn.dataset.id,btn.dataset.date,parseInt(btn.dataset.xp));
                if(ok){ saveSnapshot(date); showDayDetails(date); }
            };
        });
        detailsDiv.querySelectorAll('.day-add-btn').forEach(btn=>btn.onclick=()=>openAddTaskModal(btn.dataset.date));
        return;
    }

    // Сегодня / будущие / прошлые без снапшота
    let allDayTasks=getAllTasksForDate(date);
    if(allDayTasks.length===0){
        detailsDiv.innerHTML=`<div style="text-align:center;color:var(--text-muted);padding:8px;">Нет заданий<br>
            <button class="day-add-btn" data-date="${date}" style="margin-top:8px;">+ Добавить задание на этот день</button></div>`;
        detailsDiv.querySelectorAll('.day-add-btn').forEach(btn=>btn.onclick=()=>openAddTaskModal(btn.dataset.date));
        return;
    }

    let doneItems=allDayTasks.filter(t=>t.completedDates?.includes(date));
    let missedItems=allDayTasks.filter(t=>!t.completedDates?.includes(date));
    let earnedXP=doneItems.reduce((sum,t)=>sum+t.xpReward,0);
    let summary=buildDaySummaryHTML(dateLabel, earnedXP, doneItems.length, allDayTasks.length);

    let doneHTML='', pendingHTML='';
    if(doneItems.length){
        doneHTML=`<div class="day-section-label">✓ Выполнено</div>`
            +doneItems.map(t=>`<div class="day-detail-item done-item">
                <span class="day-detail-name">${t.emoji||'📌'} ${t.name}</span>
                <span class="day-detail-done">+${t.xpReward} XP</span>
            </div>`).join('');
    }
    if(missedItems.length){
        let sectionLabel=isFuture?'Запланировано':isPast?'✗ Пропущено':'Осталось';
        pendingHTML=`<div class="day-section-label">${sectionLabel}</div>`
            +missedItems.map(t=>{
                let canComplete=!isFuture;
                return `<div class="day-detail-item ${isPast?'missed-item':''}">
                    <span class="day-detail-name">${t.emoji||'📌'} ${t.name}</span>
                    ${canComplete
                        ?`<button class="complete-past-btn" data-id="${t.id}" data-xp="${t.xpReward}" data-date="${date}">+${t.xpReward} ✓</button>`
                        :`<span style="font-size:11px;color:var(--text-muted);">+${t.xpReward}</span>`}
                </div>`;
            }).join('');
    }

    detailsDiv.innerHTML=summary+doneHTML+pendingHTML
        +`<button class="day-add-btn" data-date="${date}" style="margin-top:10px;">+ Добавить задание</button>`;
    detailsDiv.querySelectorAll('.complete-past-btn').forEach(btn=>{
        btn.onclick=()=>{let ok=completeTask(btn.dataset.id,btn.dataset.date,parseInt(btn.dataset.xp));if(ok)showDayDetails(date);};
    });
    detailsDiv.querySelectorAll('.day-add-btn').forEach(btn=>btn.onclick=()=>openAddTaskModal(btn.dataset.date));
};


const saveAllData=()=>{
    localStorage.setItem("userTotalXP",currentXP);
    localStorage.setItem("levelStartXP",levelStartXP);
    localStorage.setItem("levelStartDate",levelStartDate);
    localStorage.setItem("customTasks",JSON.stringify(customTasks));
    localStorage.setItem("nextTaskId",nextTaskId);
    localStorage.setItem("penaltyProcessedDates",JSON.stringify(penaltyProcessedDates));
    localStorage.setItem("sortMode",currentSort);
    localStorage.setItem("importantOrder",JSON.stringify(importantOrder));
    localStorage.setItem("normalOrder",JSON.stringify(normalOrder));
    // Сохраняем базовые задачи целиком (включая правки имени/xp/расписания)
    localStorage.setItem('baseTasks_overrides', JSON.stringify(baseTasks.map(t=>({id:t.id,name:t.name,xpReward:t.xpReward,repeatType:t.repeatType,weekdays:t.weekdays,targetDate:t.targetDate,isImportant:t.isImportant,autoRollover:t.autoRollover,emoji:t.emoji,completedDates:t.completedDates,createdAt:t.createdAt,categoryId:t.categoryId||null}))));
    // Сохраняем счётчики для кастомных задач
    for(let t of customTasks) if(t.isCounter) localStorage.setItem(`counter_${t.id}_counts`,JSON.stringify(t.counterCounts||{}));
    // Сохраняем категории
    localStorage.setItem('userCategories', JSON.stringify(categories));
};

const loadAllData=()=>{
    currentXP=parseInt(localStorage.getItem("userTotalXP"))||0;
    levelStartXP=parseInt(localStorage.getItem("levelStartXP"))||0;
    levelStartDate=localStorage.getItem("levelStartDate")||getToday();
    customTasks=JSON.parse(localStorage.getItem("customTasks")||"[]");
    // Загружаем категории: берём DEFAULT_CATEGORIES как основу, мерджим сохранённые
    let savedCats=JSON.parse(localStorage.getItem('userCategories')||'null');
    // Маппинг старых эмодзи → SVG (миграция)
    const EMOJI_TO_ICON = {
        '🔁':GLOBAL_CAT_ICONS.repeat, '↻':GLOBAL_CAT_ICONS.repeat,
        '💪':GLOBAL_CAT_ICONS.run,    '🏃':GLOBAL_CAT_ICONS.run,
        '💼':GLOBAL_CAT_ICONS.work,
        '🧠':GLOBAL_CAT_ICONS.book,   '📚':GLOBAL_CAT_ICONS.book, '📖':GLOBAL_CAT_ICONS.book,
        '🧘':GLOBAL_CAT_ICONS.self,
        '📦':GLOBAL_CAT_ICONS.folder, '📁':GLOBAL_CAT_ICONS.folder, '📌':GLOBAL_CAT_ICONS.folder,
        '⭐':GLOBAL_CAT_ICONS.star,    '🌟':GLOBAL_CAT_ICONS.star,
        '🎯':GLOBAL_CAT_ICONS.target,
        '🏠':GLOBAL_CAT_ICONS.home,   '🏡':GLOBAL_CAT_ICONS.home,
        '🎵':GLOBAL_CAT_ICONS.music,  '🎶':GLOBAL_CAT_ICONS.music,
        '📊':GLOBAL_CAT_ICONS.chart,  '📈':GLOBAL_CAT_ICONS.chart,
        '☀️':GLOBAL_CAT_ICONS.sun,    '🌞':GLOBAL_CAT_ICONS.sun,
        '💧':GLOBAL_CAT_ICONS.droplet,'🌊':GLOBAL_CAT_ICONS.droplet,
        '🌿':GLOBAL_CAT_ICONS.leaf,   '🍃':GLOBAL_CAT_ICONS.leaf,
        '🌙':GLOBAL_CAT_ICONS.moon,   '😴':GLOBAL_CAT_ICONS.moon,
        '✏️':GLOBAL_CAT_ICONS.pen,    '📝':GLOBAL_CAT_ICONS.pen,
        '✅':GLOBAL_CAT_ICONS.check,
        '🔲':GLOBAL_CAT_ICONS.grid,   '⊞':GLOBAL_CAT_ICONS.grid,
        '⚡':GLOBAL_CAT_ICONS.bolt,   '🔥':GLOBAL_CAT_ICONS.bolt,
        '❤️':GLOBAL_CAT_ICONS.heart,  '💙':GLOBAL_CAT_ICONS.heart,
    };
    const migrateEmoji = c => {
        // Если emoji короткое (не SVG) — заменяем на SVG
        if(c.emoji && !c.emoji.includes('<svg')){
            c.emoji = EMOJI_TO_ICON[c.emoji] || GLOBAL_CAT_ICONS.folder;
        }
        return c;
    };
    if(savedCats){
        categories=savedCats.map(migrateEmoji);
        // Убеждаемся что locked-категории всегда присутствуют
        for(let dc of DEFAULT_CATEGORIES){
            if(dc.locked && !categories.find(c=>c.id===dc.id)) categories.unshift(dc);
        }
    } else {
        categories=[...DEFAULT_CATEGORIES];
    }
    nextTaskId=parseInt(localStorage.getItem("nextTaskId"))||(customTasks.length?Math.max(...customTasks.map(t=>t.id))+1:1);
    penaltyProcessedDates=JSON.parse(localStorage.getItem("penaltyProcessedDates")||"{}");
    let savedSort=localStorage.getItem("sortMode");
    if(savedSort&&['manual','xp-desc','xp-asc','created-desc','created-asc','name-asc','name-desc'].includes(savedSort)) currentSort=savedSort;
    importantOrder=JSON.parse(localStorage.getItem("importantOrder")||"[]");
    catOpenState=JSON.parse(localStorage.getItem('catOpenState')||'{}');
    normalOrder=JSON.parse(localStorage.getItem("normalOrder")||"[]");
    // Восстанавливаем правки базовых задач (имя, xp, расписание, completedDates)
    let baseOverrides=JSON.parse(localStorage.getItem('baseTasks_overrides')||'[]');
    for(let t of baseTasks){
        let saved=baseOverrides.find(o=>o.id===t.id);
        if(saved){
            t.name=saved.name; t.xpReward=saved.xpReward; t.repeatType=saved.repeatType;
            if(saved.weekdays) t.weekdays=saved.weekdays; else delete t.weekdays;
            if(saved.targetDate) t.targetDate=saved.targetDate; else delete t.targetDate;
            t.isImportant=saved.isImportant||false; t.autoRollover=saved.autoRollover||false;
            if(saved.categoryId !== undefined) t.categoryId=saved.categoryId;
            if(saved.emoji) t.emoji=saved.emoji;
            t.completedDates=saved.completedDates||[];
            t.createdAt=saved.createdAt||Date.now()-500000;
        } else {
            // Нет правок — грузим только completedDates из старого формата (обратная совместимость)
            let oldSaved=localStorage.getItem(`base_${t.id}_completed`);
            t.completedDates=oldSaved?JSON.parse(oldSaved):[];
            t.createdAt=t.createdAt||Date.now()-500000;
        }
    }
    for(let t of customTasks){
        if(!t.createdAt) t.createdAt=Date.now();
        if(t.isCounter){let saved=localStorage.getItem(`counter_${t.id}_counts`);t.counterCounts=saved?JSON.parse(saved):{};}
    }
    document.querySelectorAll('.dropdown-option').forEach(opt=>{
        if(opt.dataset.sort&&opt.dataset.sort===currentSort){opt.classList.add('active');opt.querySelector('.check').innerHTML='✓';}

        else{opt.classList.remove('active');opt.querySelector('.check').innerHTML='';}
    });
    updateLevelAndXP();applyPenalties();rolloverTasks();
    migrateSnapshots(); // миграция существующих данных
    renderTodayTasks();renderCalendar();
    // Сохраняем снапшот сегодняшнего дня при каждой загрузке
    saveSnapshot(getToday());
};

const setSortMode=mode=>{currentSort=mode;saveAllData();renderTodayTasks();};

// ===================== ЭКСПОРТ / ИМПОРТ =====================
const exportProgress = () => {
    let data = {};
    for(let k of Object.keys(localStorage)) data[k] = localStorage.getItem(k);
    let json = JSON.stringify(data, null, 2);
    let blob = new Blob([json], {type:'application/json'});
    let url = URL.createObjectURL(blob);
    let a = document.createElement('a');
    let date = new Date().toISOString().slice(0,10);
    a.href = url; a.download = `progressia_backup_${date}.json`;
    a.click(); URL.revokeObjectURL(url);
};

const importProgress = (file) => {
    if(!file) return;
    let reader = new FileReader();
    reader.onload = e => {
        try {
            let data = JSON.parse(e.target.result);
            let keys = Object.keys(data);
            if(!keys.length) throw new Error('Пустой файл');
            if(!confirm(`Импортировать ${keys.length} записей?\nТекущие данные будут заменены.`)) return;
            localStorage.clear();
            for(let [k,v] of Object.entries(data)) localStorage.setItem(k,v);
            // Сброс in-memory состояния
            for(let t of baseTasks) t.completedDates=[];
            loadAllData();
            alert('✓ Прогресс восстановлен!');
        } catch(err) {
            alert('Ошибка: файл повреждён или неверный формат.\n'+err.message);
        }
    };
    reader.readAsText(file);
};

const initTheme=()=>{
    let saved=localStorage.getItem('theme'),btn=document.getElementById('themeToggle');
    if(saved==='light'){document.body.classList.add('light');btn.innerHTML='<span class="moon-icon"></span>';}
    else{document.body.classList.remove('light');btn.innerHTML='<span class="sun-icon"></span>';}
};
const toggleTheme=()=>{
    let btn=document.getElementById('themeToggle');
    if(document.body.classList.contains('light')){document.body.classList.remove('light');localStorage.setItem('theme','dark');btn.innerHTML='<span class="sun-icon"></span>';}
    else{document.body.classList.add('light');localStorage.setItem('theme','light');btn.innerHTML='<span class="moon-icon"></span>';}
};

document.getElementById("menuBtn").onclick=()=>{document.getElementById("sidebar").classList.add("open");document.getElementById("overlay").classList.add("open");};
document.getElementById("closeSidebar").onclick=()=>{document.getElementById("sidebar").classList.remove("open");document.getElementById("overlay").classList.remove("open");};
document.getElementById("overlay").onclick=()=>{document.getElementById("sidebar").classList.remove("open");document.getElementById("overlay").classList.remove("open");};
document.getElementById("prevMonth").onclick=()=>{calDate.setMonth(calDate.getMonth()-1);renderCalendar();};
document.getElementById("nextMonth").onclick=()=>{calDate.setMonth(calDate.getMonth()+1);renderCalendar();};
document.getElementById("resetBtn").onclick=()=>{
    if(confirm("⚠️ Внимание!\n\nВесь прогресс, XP, уровни и выполненные задания будут удалены безвозвратно.\n\nПродолжить?")){
        currentXP=0;customTasks=[];nextTaskId=1;penaltyProcessedDates={};levelStartXP=0;levelStartDate=getToday();importantOrder=[];normalOrder=[];
        for(let t of baseTasks) t.completedDates=[];
        // Удаляем все снапшоты и сбрасываем флаг миграции
        Object.keys(localStorage).filter(k=>k.startsWith('snapshot_')).forEach(k=>localStorage.removeItem(k));
        localStorage.removeItem('snapshots_migrated');
        saveAllData();updateLevelAndXP();renderTodayTasks();renderCalendar();
    }
};
document.getElementById("openAddTaskModal").onclick=()=>openAddTaskModal();
document.getElementById("themeToggle").onclick=()=>toggleTheme();
document.getElementById("manageTasksBtn").onclick=()=>openManageTasksModal();
document.getElementById("exportBtn").onclick=()=>exportProgress();
document.getElementById("importFile").onchange=e=>importProgress(e.target.files[0]);
document.getElementById("manageCatsBtn").onclick=()=>openManageCategoriesModal();
document.getElementById("levelBox").onclick=()=>openHistoryModal();

const sortMenu=document.getElementById('sortMenu'),sortTrigger=document.getElementById('sortTrigger');
sortTrigger.onclick=e=>{e.stopPropagation();sortMenu.classList.toggle('open');};
document.querySelectorAll('#sortDropdown .dropdown-option').forEach(opt=>{opt.onclick=()=>{setSortMode(opt.dataset.sort);sortMenu.classList.remove('open');};});



initTheme();
loadAllData();
</script>
